server:
  port: 9292

spring:
  application:
    name: ledger-service
  config:
    import:
      - classpath:kafka-config.yml
      - classpath:kafka-consumer-config.yml
      - classpath:kafka-producer-config.yml
  datasource:
    hikari:
      jdbc-url: jdbc:mysql://localhost:3306/ledger?useUnicode=true&serverTimezone=Asia/Seoul
      username: root
      password: 1234
    url: jdbc:mysql://localhost:3306/ledger?useUnicode=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false
  sql:
    init:
      mode: never

logging:
  level:
    org:
      springframework:
        transaction: trace
        orm:
          jpa: debug
        kafka: trace

kafka:
  topics:
    payment:
      confirmed: payment-confirm-event-v1

kafka-consumer-config:
  group-id: wallet-service-group16